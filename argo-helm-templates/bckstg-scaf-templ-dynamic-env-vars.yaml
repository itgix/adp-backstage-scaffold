apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: bckstg-dynamic-env-variables-deployer
  title: Dynamic Environment Variables Application Deployer
  description: |
    Deploy an application with dynamically defined environment variables.
    Add environment variables directly with their values in a single step.
    Regular variables are stored in ConfigMaps, secrets in Kubernetes Secrets.
    Uses the same Helm chart structure as standard deployments.
  tags:
    - recommended
    - argocd
    - kubernetes
    - helm
    - dynamic-env-vars
    - environment-variables

spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  # CONFIGURATION: Easily change these for different implementations
  # For AWS: use regions like eu-west-1, us-east-1
  # For other clouds: use regions like dus6, sin1, etc.
  parameters:
    - title: Application Configuration
      description: Basic app info and deployment target
      properties:
        bkst_app_name:
          title: Application Name
          type: string
          description: Application name (lowercase alphanumeric with hyphens)
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 20

        bkst_app_description:
          title: Application Description
          type: string
          description: Short description of the application

        # CONFIGURABLE: Modify these lists to match your environments
        # For AWS: [eu-west-1, eu-central-1, us-east-1, ap-southeast-1]
        # For multi-cloud: [dus6, sin1, sfo6] or similar
        bkst_app_stage:
          title: Deployment Stage
          type: string
          enum:
            - stg
            - prod
          default: stg
          enumNames:
            - Staging
            - Production

        # CONFIGURABLE: Modify these lists to match your cloud regions
        # Currently set to: stg, prod (easily changeable)
        bkst_app_region:
          title: Region
          type: string
          enum:
            - dus6
          default: dus6
          enumNames:
            - 'Düsseldorf (dus6)'

    # STEP 2: Regular environment variables with values
    - title: Regular Environment Variables
      description: |
        Add regular environment variables (non-sensitive).
        These will be stored in ConfigMaps and visible in Kubernetes.
        Use the + button to add each variable with its value.
      properties:
        envVariables:
          title: Environment Variables (Name and Value)
          type: array
          minItems: 0
          maxItems: 50
          ui:options:
            addable: true
            orderable: true
            removable: true
          items:
            type: object
            required:
              - varName
              - varValue
            properties:
              varName:
                title: Variable Name
                type: string
                description: 'e.g., LOG_LEVEL, API_TIMEOUT, DATABASE_POOL_SIZE'
                pattern: '^[A-Z_][A-Z0-9_]*$'
                maxLength: 50

              varValue:
                title: Value
                type: string
                description: The value for this environment variable
                maxLength: 500

    # STEP 3: Secret environment variables with values
    - title: Secret Environment Variables
      description: |
        Add secret variables (passwords, tokens, API keys, database credentials).
        These will be stored in Kubernetes Secrets and treated as sensitive data.
        Use the + button to add each secret with its value.
      properties:
        secretVariables:
          title: Secret Variables (Name and Value)
          type: array
          minItems: 0
          maxItems: 50
          ui:options:
            addable: true
            orderable: true
            removable: true
          items:
            type: object
            required:
              - secretVarName
              - secretVarValue
            properties:
              secretVarName:
                title: Secret Variable Name
                type: string
                description: 'e.g., DB_PASSWORD, API_KEY, OAUTH_TOKEN'
                pattern: '^[A-Z_][A-Z0-9_]*$'
                maxLength: 50

              secretVarValue:
                title: Secret Value
                type: string
                description: The secret value (will be stored securely)
                ui:widget: password
                maxLength: 1000

              externalSecretKey:
                title: External Secret Store Key (Optional)
                type: string
                description: |
                  Reference to external secret store (AWS Secrets Manager, Vault, etc.)
                  Format: my-app/db-password
                  Leave empty if storing value directly in Kubernetes Secret.
                default: ''

    # STEP 4: Application deployment configuration
    - title: Application Deployment Configuration
      description: Configure how your application will be deployed
      properties:
        bkst_app_imagename:
          title: Container Image Repository
          type: string
          description: Container image repository (e.g., myregistry.azurecr.io/myapp or nginx)
          default: nginx

        bkst_app_image_tag:
          title: Container Image Tag
          type: string
          description: Docker image tag/version
          default: 'latest'

        bkst_app_health_probe:
          title: Health Check Path
          type: string
          description: HTTP path for liveness/readiness probes
          default: '/'

        bkst_app_mem:
          title: Memory Limit
          type: string
          enum:
            - 256Mi
            - 512Mi
            - 1Gi
            - 2Gi
            - 4Gi
          default: 512Mi
          enumNames:
            - 256 MB
            - 512 MB
            - 1 GB
            - 2 GB
            - 4 GB

        bkst_app_cpu_limit:
          title: CPU Limit
          type: string
          enum:
            - 100m
            - 250m
            - 500m
            - 1000m
            - 2000m
          default: 500m
          enumNames:
            - 0.1 core
            - 0.25 core
            - 0.5 core
            - 1 core
            - 2 cores


  steps:
    # Debug step: Log the input variables
    - id: log-variables
      name: Log Environment Variables Definition
      action: debug:log
      input:
        message: |
          Creating deployment for application: ${{ parameters.bkst_app_name }}
          Stage: ${{ parameters.bkst_app_stage }}
          Region: ${{ parameters.bkst_app_region }}
          Regular env variables: ${{ parameters.envVariables | length }}
          Secret env variables: ${{ parameters.secretVariables | length }}

    # Fetch the base skeleton (reuses existing Helm chart structure)
    - id: fetch-skeleton
      name: Fetch Application Skeleton
      action: fetch:template
      input:
        url: ./skeleton-dynamic-env-vars
        targetPath: ./
        values:
          bkst_app_name: ${{ parameters.bkst_app_name }}
          bkst_app_stage: ${{ parameters.bkst_app_stage }}
          bkst_app_region: ${{ parameters.bkst_app_region }}
          bkst_app_imagename: ${{ parameters.bkst_app_imagename }}
          bkst_app_image_tag: ${{ parameters.bkst_app_image_tag }}
          bkst_app_health_probe: ${{ parameters.bkst_app_health_probe }}
          bkst_app_mem: ${{ parameters.bkst_app_mem }}
          bkst_app_cpu_limit: ${{ parameters.bkst_app_cpu_limit }}

    # Create environment variables values file
    - id: create-env-values-file
      name: Create Environment Variables Configuration
      action: fs:write
      input:
        path: ./${{ parameters.bkst_app_name }}/values/${{ parameters.bkst_app_stage }}-env-vars.yaml
        content: |
          # Generated regular environment variables for: ${{ parameters.bkst_app_name }}
          # Stage: ${{ parameters.bkst_app_stage }}
          # Region: ${{ parameters.bkst_app_region }}
          # Auto-generated on: $(date)

          {%- if parameters.envVariables and parameters.envVariables | length > 0 %}
          # Regular environment variables (stored in ConfigMap)
          env:
          {%- for var in parameters.envVariables %}
            {{ var.varName }}: "${{ var.varValue }}"
          {%- endfor %}
          {%- else %}
          # No regular environment variables defined
          env: {}
          {%- endif %}

    # Create secret environment variables values file
    - id: create-secrets-values-file
      name: Create Secrets Configuration
      action: fs:write
      input:
        path: ./${{ parameters.bkst_app_name }}/values/${{ parameters.bkst_app_stage }}-secrets.yaml
        content: |
          # Generated secret environment variables for: ${{ parameters.bkst_app_name }}
          # Stage: ${{ parameters.bkst_app_stage }}
          # Region: ${{ parameters.bkst_app_region }}
          # Auto-generated on: $(date)

          {%- if parameters.secretVariables and parameters.secretVariables | length > 0 %}
          # Secret environment variables (stored in Kubernetes Secrets)
          secrets:
          {%- for secret in parameters.secretVariables %}
            - name: {{ secret.secretVarName }}
              value: "${{ secret.secretVarValue }}"
          {%- if secret.externalSecretKey %}
              externalSecretKey: "{{ secret.externalSecretKey }}"
          {%- endif %}
          {%- endfor %}
          {%- else %}
          # No secret variables defined
          secrets: []
          {%- endif %}

    # Loop through and log regular environment variables
    - id: log-env-variables
      name: Log Regular Environment Variables
      each: ${{ parameters.envVariables }}
      action: debug:log
      input:
        message: 'Regular env var: ${{ each.value.varName }}'

    # Loop through and log secret variables (without showing values)
    - id: log-secret-variables
      name: Log Secret Variables Defined
      each: ${{ parameters.secretVariables }}
      action: debug:log
      input:
        message: 'Secret env var defined: ${{ each.value.secretVarName }}'

    # Create comprehensive documentation
    - id: create-documentation
      name: Create Environment Variables Documentation
      action: fs:write
      input:
        path: ./ENV_VARS_DOCUMENTATION.md
        content: |
          # Environment Variables Documentation

          **Application:** ${{ parameters.bkst_app_name }}
          **Description:** ${{ parameters.bkst_app_description }}
          **Stage:** ${{ parameters.bkst_app_stage }}
          **Region:** ${{ parameters.bkst_app_region }}
          **Container Image:** ${{ parameters.bkst_app_imagename }}:${{ parameters.bkst_app_image_tag }}

          ## Regular Environment Variables

          {{#if parameters.envVariables}}
          {{#if parameters.envVariables.length}}
          | Variable Name | Value |
          |---|---|
          {{#each parameters.envVariables}}
          | `{{ this.varName }}` | `${{ this.varValue }}` |
          {{/each}}
          {{else}}
          No regular environment variables defined.
          {{/if}}
          {{else}}
          No regular environment variables defined.
          {{/if}}

          ## Secret Environment Variables

          {{#if parameters.secretVariables}}
          {{#if parameters.secretVariables.length}}
          | Variable Name | External Secret Key |
          |---|---|
          {{#each parameters.secretVariables}}
          | `{{ this.secretVarName }}` | {{ this.externalSecretKey || 'Stored as Kubernetes Secret' }} |
          {{/each}}

          **Note:** Secret values are NOT displayed in this documentation for security reasons.
          {{else}}
          No secret variables defined.
          {{/if}}
          {{else}}
          No secret variables defined.
          {{/if}}

          ## Application Configuration

          - **Memory Limit:** ${{ parameters.bkst_app_mem }}
          - **CPU Limit:** ${{ parameters.bkst_app_cpu_limit }}
          - **Health Check Path:** ${{ parameters.bkst_app_health_probe }}

          ## Generated Files

          The following configuration files were generated:

          - `${{ parameters.bkst_app_name }}/values/${{ parameters.bkst_app_stage }}-env-vars.yaml` - Regular environment variables
          - `${{ parameters.bkst_app_name }}/values/${{ parameters.bkst_app_stage }}-secrets.yaml` - Secret variables configuration
          - `${{ parameters.bkst_app_name }}/Chart.yaml.hbs` - Helm chart metadata
          - `${{ parameters.bkst_app_name }}/values.yaml.hbs` - Base Helm values
          - `${{ parameters.bkst_app_name }}/values/${{ parameters.bkst_app_stage }}-${{ parameters.bkst_app_region }}/values.yaml.hbs` - Stage/region-specific values

    # Create a Pull Request with the generated configuration
    - id: create-pull-request
      name: Create Feature Branch and Pull Request
      action: publish:github:pull-request
      # action: publish:gitlab:merge-request
      input:
        repoUrl: 'github.com?owner=${{ environment.secrets.repoOwner }}&repo=${{ environment.secrets.repoName }}'
        branchName: 'feat/app-${{ parameters.bkst_app_name }}-env-vars'
        title: 'Add app: ${{ parameters.bkst_app_name }} with environment variables'
        sourcePath: .
        description: |
          This PR adds the configuration for application **${{ parameters.bkst_app_name }}** with:
          - Stage: ${{ parameters.bkst_app_stage }}
          - Region: ${{ parameters.bkst_app_region }}
          - Regular environment variables: ${{ parameters.envVariables | length }}
          - Secret variables: ${{ parameters.secretVariables | length }}

  output:
    links:
      - title: Pull Request
        url: ${{ steps['create-pull-request'].output.remoteUrl }}
    text:
      - title: Deployment Configuration Created
        content: |
          Successfully created deployment configuration for **${{ parameters.bkst_app_name }}**

          **Configuration Summary:**
          - **Stage:** ${{ parameters.bkst_app_stage }}
          - **Region:** ${{ parameters.bkst_app_region }}
          - **Image:** ${{ parameters.bkst_app_imagename }}:${{ parameters.bkst_app_image_tag }}
          - **Regular Environment Variables:** ${{ parameters.envVariables | length }}
          - **Secret Environment Variables:** ${{ parameters.secretVariables | length }}

          **Generated Environment Variable Files:**
          - `values/${{ parameters.bkst_app_stage }}-env-vars.yaml` - Regular ConfigMap environment variables
          - `values/${{ parameters.bkst_app_stage }}-secrets.yaml` - Kubernetes Secret configuration

          **Next Steps:**
          1. Review the pull request
          2. Verify environment variable values and secrets are correct
          3. For production, ensure secrets are managed via external secret store
          4. Merge the pull request to trigger ArgoCD deployment
          5. Monitor the deployment in your Kubernetes cluster
