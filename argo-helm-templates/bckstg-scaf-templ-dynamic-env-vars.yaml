apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: bckstg-dynamic-env-variables-deployer
  title: Dynamic Environment Variables Application Deployer
  description: |
    Deploy an application with dynamically defined environment variables.
    Add environment variables directly with their values in a single step.
    Regular variables are stored in ConfigMaps, secrets in Kubernetes Secrets.
    Uses the same Helm chart structure as standard deployments.
  tags:
    - recommended
    - argocd
    - kubernetes
    - helm
    - dynamic-env-vars
    - environment-variables

spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  # CONFIGURATION: Easily change these for different implementations
  # For AWS: use regions like eu-west-1, us-east-1
  # For other clouds: use regions like dus6, sin1, etc.
  parameters:
    - title: Application Configuration
      description: Basic app info and deployment target
      properties:
        bkst_app_name:
          title: Application Name
          type: string
          description: Application name (lowercase alphanumeric with hyphens)
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 20

        bkst_app_description:
          title: Application Description
          type: string
          description: Short description of the application

        # CONFIGURABLE: Modify these lists to match your environments
        # For AWS: [eu-west-1, eu-central-1, us-east-1, ap-southeast-1]
        # For multi-cloud: [dus6, sin1, sfo6] or similar
        bkst_app_stage:
          title: Deployment Stage
          type: string
          enum:
            - stg
            - prod
          default: stg
          enumNames:
            - Staging
            - Production

        # CONFIGURABLE: Modify these lists to match your cloud regions
        # Currently set to: stg, prod (easily changeable)
        bkst_app_region:
          title: Region
          type: string
          enum:
            - dus6
          default: dus6
          enumNames:
            - 'Düsseldorf (dus6)'

        enableIngress:
          title: Expose service with Ingress
          type: boolean
          description: Enable ingress to expose the service to the outside
          default: false

        ingressUrl:
          title: Ingress URL (optional)
          type: string
          description: The URL/hostname for the ingress (e.g., myapp.example.com)
          maxLength: 255
          ui:options:
            rows: 1

    # STEP 2: Regular environment variables with values
    - title: Regular Environment Variables
      description: |
        Add regular environment variables (non-sensitive).
        These will be stored in ConfigMaps and visible in Kubernetes.
        Use the + button to add each variable with its value.
      properties:
        envVariables:
          title: Environment Variables (Name and Value)
          type: array
          minItems: 0
          maxItems: 50
          ui:options:
            addable: true
            orderable: true
            removable: true
          items:
            type: object
            required:
              - varName
              - varValue
            properties:
              varName:
                title: Variable Name
                type: string
                description: 'e.g., LOG_LEVEL, API_TIMEOUT, DATABASE_POOL_SIZE'
                pattern: '^[A-Z_][A-Z0-9_]*$'
                maxLength: 50

              varValue:
                title: Value
                type: string
                description: The value for this environment variable
                maxLength: 500

    # STEP 3: Secret environment variables configuration
    - title: Secret Environment Variables
      description: |
        Add secret variables that reference an external secret store (AWS Secrets Manager, Vault, etc.).
        Secrets are not stored in the template - only the reference key and property are configured.
        Use the + button to add each secret configuration.
      properties:
        secretVariables:
          title: Secret Variables Configuration
          type: array
          minItems: 0
          maxItems: 50
          ui:options:
            addable: true
            orderable: true
            removable: true
          items:
            type: object
            required:
              - secretVarName
              - secretStoreKey
              - secretProperty
            properties:
              secretVarName:
                title: Secret Variable Name
                type: string
                description: 'Environment variable name (e.g., DB_PASSWORD, API_KEY, OAUTH_TOKEN)'
                pattern: '^[A-Z_][A-Z0-9_]*$'
                maxLength: 50

              secretStoreKey:
                title: External Secret Store Key
                type: string
                description: |
                  Key path in the external secret store.
                  Examples: my-app/db-password, my-app/stripe-key
                maxLength: 200

              secretProperty:
                title: Secret Property
                type: string
                description: |
                  Property name within the secret.
                  Examples: password, username, api_key, value
                default: 'value'
                maxLength: 50

    # STEP 4: Application deployment configuration
    - title: Application Deployment Configuration
      description: Configure how your application will be deployed
      properties:
        bkst_app_imagename:
          title: Container Image Repository
          type: string
          description: Container image repository (e.g., myregistry.azurecr.io/myapp or nginx)
          default: nginx

        bkst_app_image_tag:
          title: Container Image Tag
          type: string
          description: Docker image tag/version
          default: 'latest'

        bkst_app_health_probe:
          title: Health Check Path
          type: string
          description: HTTP path for liveness/readiness probes
          default: '/'

        bkst_app_mem:
          title: Memory Limit
          type: string
          enum:
            - 256Mi
            - 512Mi
            - 1Gi
            - 2Gi
            - 4Gi
            - 6Gi
          default: 512Mi
          enumNames:
            - 256 MB
            - 512 MB
            - 1 GB
            - 2 GB
            - 4 GB
            - 6 GB

        bkst_app_cpu_limit:
          title: CPU Limit
          type: string
          enum:
            - 100m
            - 250m
            - 500m
            - 1000m
            - 2000m
          default: 500m
          enumNames:
            - 0.1 core
            - 0.25 core
            - 0.5 core
            - 1 core
            - 2 cores


  steps:
    # Debug step: Log the input variables
    - id: log-variables
      name: Log Environment Variables Definition
      action: debug:log
      input:
        message: |
          Creating deployment for application: ${{ parameters.bkst_app_name }}
          Stage: ${{ parameters.bkst_app_stage }}
          Region: ${{ parameters.bkst_app_region }}
          Ingress Enabled: ${{ parameters.enableIngress }}
          Ingress URL: ${{ parameters.ingressUrl }}
          Regular env variables: ${{ parameters.envVariables | length }}
          Secret env variables: ${{ parameters.secretVariables | length }}

    # Fetch and render the skeleton with all parameters including env variables
    - id: fetch-base
      name: Fetch and Render Template with Environment Variables
      action: fetch:template
      input:
        url: ./skeleton-dynamic-env-vars/
        targetPath: ./helm/
        values:
          bkst_app_name: ${{ parameters.bkst_app_name }}
          bkst_app_stage: ${{ parameters.bkst_app_stage }}
          bkst_app_region: ${{ parameters.bkst_app_region }}
          bkst_app_imagename: ${{ parameters.bkst_app_imagename }}
          bkst_app_image_tag: ${{ parameters.bkst_app_image_tag }}
          bkst_app_health_probe: ${{ parameters.bkst_app_health_probe }}
          bkst_app_mem: ${{ parameters.bkst_app_mem }}
          bkst_app_cpu_limit: ${{ parameters.bkst_app_cpu_limit }}
          bkst_app_description: ${{ parameters.bkst_app_description }}
          envVariables: ${{ parameters.envVariables }}
          secretVariables: ${{ parameters.secretVariables }}
          enableIngress: ${{ parameters.enableIngress }}
          ingressUrl: ${{ parameters.ingressUrl }}

    # Rename files and directories to substitute placeholders
    - id: rename-files
      name: Rename Files and Directories
      action: fs:rename
      input:
        files:
          # 1) deepest files FIRST (strip .hbs)
          - from: helm/APP_NAME/values/STAGE/REGION/values.yaml.hbs
            to: helm/APP_NAME/values/STAGE/REGION/values.yaml

          - from: helm/APP_NAME/values.yaml.hbs
            to: helm/APP_NAME/values.yaml

          - from: helm/APP_NAME/Chart.yaml.hbs
            to: helm/APP_NAME/Chart.yaml

          # 2) REGION directory
          - from: helm/APP_NAME/values/STAGE/REGION
            to: helm/APP_NAME/values/STAGE/${{ parameters.bkst_app_region }}

          # 3) STAGE directory
          - from: helm/APP_NAME/values/STAGE
            to: helm/APP_NAME/values/${{ parameters.bkst_app_stage }}

          # 4) APP_NAME directory LAST
          - from: helm/APP_NAME
            to: helm/${{ parameters.bkst_app_name }}

    # Loop through and log regular environment variables
    - id: log-env-variables
      name: Log Regular Environment Variables
      each: ${{ parameters.envVariables }}
      action: debug:log
      input:
        message: 'Regular env var: ${{ each.value.varName }}'

    # Loop through and log secret variables (without showing values)
    - id: log-secret-variables
      name: Log Secret Variables Defined
      each: ${{ parameters.secretVariables }}
      action: debug:log
      input:
        message: 'Secret env var defined: ${{ each.value.secretVarName }}'


    # Create a Pull Request with the generated configuration
    - id: create-pull-request
      name: Create Feature Branch and Pull Request
      # action: publish:github:pull-request
      action: publish:gitlab:merge-request
      input:
        repoUrl: 'gitlab.phoenix.net-digital.com/?owner=${{ environment.secrets.repoOwner }}&repo=${{ environment.secrets.repoName }}'
        branchName: 'feat/new-app-${{ parameters.bkst_app_name }}'
        targetBranchName: 'main'
        title: 'New App: ${{ parameters.bkst_app_name }} Scaffolded'
        sourcePath: .
        description: 'This MR adds the initial configuration for the new application ${{ parameters.bkst_app_name }}.'

  output:
    links:
      - title: Review the Merge Request and merge to apply changes
        url: ${{ steps['create-merge-request'].output.mergeRequestUrl }}
    text:
      - title: Deployment Configuration Created
        content: |
          Successfully created deployment configuration for **${{ parameters.bkst_app_name }}**

          **Configuration Summary:**
          - **Stage:** ${{ parameters.bkst_app_stage }}
          - **Region:** ${{ parameters.bkst_app_region }}
          - **Image:** ${{ parameters.bkst_app_imagename }}:${{ parameters.bkst_app_image_tag }}
          - **Regular Environment Variables:** ${{ parameters.envVariables | length }}
          - **Secret Environment Variables:** ${{ parameters.secretVariables | length }}

          **Generated Environment Variable Files:**
          - `values/${{ parameters.bkst_app_stage }}-env-vars.yaml` - Regular ConfigMap environment variables
          - `values/${{ parameters.bkst_app_stage }}-secrets.yaml` - Kubernetes Secret configuration

          **Next Steps:**
          1. Review the pull request
          2. Verify environment variable values and secrets are correct
          3. For production, ensure secrets are managed via external secret store
          4. Merge the pull request to trigger ArgoCD deployment
          5. Monitor the deployment in your Kubernetes cluster
