apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: bckstg-dynamic-multi-service-deployer
  title: Dynamic Multi-Service Application Deployer
  description: |
    Deploy multiple microservices with dynamic form fields. Add services in the first step,
    and detailed configuration fields will be generated for each service in the second step.
  tags:
    - recommended
    - argocd
    - kubernetes
    - helm
    - dynamic-forms
  links:
    - url: https://backstage.io/docs/features/software-templates/input-examples/
      title: Backstage Input Examples
spec:
  owner: platform-team
  type: service
  lifecycle: experimental

  parameters:
    # STEP 1: Collect list of services to deploy
    - title: Services Configuration
      description: Define the microservices you want to deploy
      properties:
        appNamePrefix:
          title: Application Name Prefix
          type: string
          description: Prefix for all services (e.g., 'payment', 'order')
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          maxLength: 15

        projectDescription:
          title: Project Description
          type: string
          description: Description of this multi-service project

        # ARRAY INPUT: List of services to create
        services:
          title: Microservices to Deploy
          type: array
          minItems: 1
          maxItems: 10
          ui:options:
            addable: true
            orderable: true
            removable: true
          items:
            type: object
            required:
              - serviceName
              - port
            properties:
              serviceName:
                title: Service Name
                type: string
                description: Name of the microservice (e.g., 'api', 'worker', 'scheduler')
                pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
                maxLength: 20

              port:
                title: Container Port
                type: number
                description: Port the service listens on
                default: 8080
                minimum: 1000
                maximum: 65535

              healthCheckPath:
                title: Health Check Endpoint
                type: string
                description: Path for liveness/readiness probes
                default: /health

              requiresDatabase:
                title: Requires Database?
                type: boolean
                description: Does this service need a database?
                default: false

    # STEP 2: Conditional detailed configuration per service
    - title: Service-Specific Configuration
      description: Configure each service with resources and environment details
      dependencies:
        services:
          # For each service in the array, create detailed configuration sections
          oneOf:
            - properties:
                servicesCount:
                  type: string
                  enum: ['0']

      # Dynamically create configuration groups for each service
      # Note: We use a workaround by creating named properties for first 5 services
      # In production, consider custom React field components for unlimited services
      properties:
        # Service 1 Configuration (shown conditionally)
        service0Config:
          title: 'Service 1: Resource Configuration'
          type: object
          description: Configure resources for the first service
          properties:
            image:
              title: Container Image
              type: string
              description: 'Full image path (e.g., gcr.io/myproject/api:v1.0.0)'
              pattern: '^[a-z0-9\-._\/]+:[a-z0-9\-._]+$'

            imagePullPolicy:
              title: Image Pull Policy
              type: string
              enum:
                - Always
                - IfNotPresent
                - Never
              default: IfNotPresent

            replicas:
              title: Number of Replicas
              type: number
              default: 1
              minimum: 1
              maximum: 10

            cpuRequest:
              title: CPU Request
              type: string
              default: 100m
              enum:
                - 50m
                - 100m
                - 250m
                - 500m
                - 1000m

            cpuLimit:
              title: CPU Limit
              type: string
              default: 500m
              enum:
                - 250m
                - 500m
                - 1000m
                - 2000m

            memoryRequest:
              title: Memory Request
              type: string
              default: 128Mi
              enum:
                - 128Mi
                - 256Mi
                - 512Mi
                - 1Gi
                - 2Gi

            memoryLimit:
              title: Memory Limit
              type: string
              default: 512Mi
              enum:
                - 256Mi
                - 512Mi
                - 1Gi
                - 2Gi
                - 4Gi

        # Service 2 Configuration
        service1Config:
          title: 'Service 2: Resource Configuration'
          type: object
          description: Configure resources for the second service
          properties:
            image:
              title: Container Image
              type: string
              pattern: '^[a-z0-9\-._\/]+:[a-z0-9\-._]+$'

            replicas:
              title: Number of Replicas
              type: number
              default: 1
              minimum: 1
              maximum: 10

            cpuRequest:
              title: CPU Request
              type: string
              default: 100m

            memoryRequest:
              title: Memory Request
              type: string
              default: 128Mi

        # Service 3 Configuration
        service2Config:
          title: 'Service 3: Resource Configuration'
          type: object
          description: Configure resources for the third service
          properties:
            image:
              title: Container Image
              type: string
              pattern: '^[a-z0-9\-._\/]+:[a-z0-9\-._]+$'

            replicas:
              title: Number of Replicas
              type: number
              default: 1

    # STEP 3: Deployment Target Configuration
    - title: Deployment Target
      description: Where and how to deploy these services
      properties:
        deploymentStage:
          title: Deployment Stage
          type: string
          enum:
            - dev
            - staging
            - production
          default: dev
          enumNames:
            - Development
            - Staging
            - Production

        awsRegion:
          title: AWS Region
          type: string
          enum:
            - us-east-1
            - eu-west-1
            - ap-southeast-1
          default: eu-west-1
          enumNames:
            - 'US East (N. Virginia)'
            - 'EU West (Ireland)'
            - 'AP Southeast (Singapore)'

        gitProvider:
          title: Git Provider
          type: string
          enum:
            - github
            - gitlab
          default: github
          enumNames:
            - GitHub
            - GitLab

        repositoryUrl:
          title: Repository URL
          type: string
          ui:widget: textarea
          description: |
            The URL to the repository where the generated configuration will be pushed.
            Format: github.com?owner=<owner>&repo=<repo>
            or gitlab.com?owner=<group>&repo=<repo>

  steps:
    # Step 1: Log the input for debugging
    - id: log-services
      name: Log Input Services
      action: debug:log
      input:
        message: 'Creating deployment for services: ${{ parameters.appNamePrefix }}'
        extra: ${{ parameters.services | dump }}

    # Step 2: Loop through services and create configuration for each
    - id: create-service-configs
      name: Create Service Configurations
      each: ${{ parameters.services }}
      action: fetch:template
      input:
        url: ./skeleton-dynamic-services/service-template
        targetPath: ./services/${{ each.value.serviceName }}-${{ parameters.deploymentStage }}
        values:
          # Service metadata
          serviceName: ${{ each.value.serviceName }}
          servicePort: ${{ each.value.port }}
          healthCheckPath: ${{ each.value.healthCheckPath }}
          requiresDatabase: ${{ each.value.requiresDatabase }}

          # Application prefix
          appNamePrefix: ${{ parameters.appNamePrefix }}
          deploymentStage: ${{ parameters.deploymentStage }}
          awsRegion: ${{ parameters.awsRegion }}

          # Dynamic configuration (this is a simplified approach)
          # In production, you'd want to map service indices to their configs
          image: ${{ parameters.service0Config.image if loop.index0 == 0 else 'placeholder' }}
          replicas: ${{ parameters.service0Config.replicas if loop.index0 == 0 else 1 }}
          cpuRequest: ${{ parameters.service0Config.cpuRequest if loop.index0 == 0 else '100m' }}
          memoryRequest: ${{ parameters.service0Config.memoryRequest if loop.index0 == 0 else '128Mi' }}

    # Step 3: Create ArgoCD application manifest
    - id: create-argocd-app
      name: Create ArgoCD Application
      action: fetch:template
      input:
        url: ./skeleton-dynamic-services/argocd-template
        targetPath: ./argocd
        values:
          appNamePrefix: ${{ parameters.appNamePrefix }}
          deploymentStage: ${{ parameters.deploymentStage }}
          awsRegion: ${{ parameters.awsRegion }}
          servicesCount: ${{ parameters.services | length }}
          services: ${{ parameters.services | dump }}

    # Step 4: Create configuration README
    - id: create-readme
      name: Create Documentation
      action: fetch:template
      input:
        url: ./skeleton-dynamic-services/readme-template
        targetPath: ./
        values:
          appNamePrefix: ${{ parameters.appNamePrefix }}
          projectDescription: ${{ parameters.projectDescription }}
          deploymentStage: ${{ parameters.deploymentStage }}
          servicesCount: ${{ parameters.services | length }}
          services: ${{ parameters.services | dump }}

    # Step 5: Publish to repository
    - id: publish-github
      if: ${{ parameters.gitProvider === 'github' }}
      name: Publish to GitHub
      action: publish:github
      input:
        allowedHosts:
          - github.com
        description: 'Multi-service deployment for ${{ parameters.appNamePrefix }}'
        repoUrl: ${{ parameters.repositoryUrl }}
        sourcePath: .

    # Step 6: Publish to GitLab (alternative)
    - id: publish-gitlab
      if: ${{ parameters.gitProvider === 'gitlab' }}
      name: Publish to GitLab
      action: publish:gitlab
      input:
        repoUrl: ${{ parameters.repositoryUrl }}
        sourcePath: .

    # Step 7: Register in Backstage catalog
    - id: register-catalog
      name: Register in Backstage Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish-github'].output.repoContentsUrl | default(steps['publish-gitlab'].output.repoContentsUrl) }}
        catalogInfoPath: /catalog-info.yaml

  output:
    text:
      - title: Repository Information
        content: |
          Your multi-service application has been created!

          **Repository:** ${{ steps['publish-github'].output.remoteUrl | default(steps['publish-gitlab'].output.remoteUrl) }}

          **Branch:** ${{ steps['publish-github'].output.branch | default(steps['publish-gitlab'].output.branch) }}

          **Services Created:** ${{ parameters.services | length }}

          **Deployment Configuration:**
          - Stage: ${{ parameters.deploymentStage }}
          - Region: ${{ parameters.awsRegion }}
          - Git Provider: ${{ parameters.gitProvider }}

          The following services were configured:
          {%- for service in parameters.services %}
          - {{ service.serviceName }} (port: {{ service.port }})
          {%- endfor %}

          Next steps:
          1. Review the generated configuration in your repository
          2. Merge the pull/merge request to trigger ArgoCD deployment
          3. Monitor the deployment in your Kubernetes cluster
          4. Access services via their configured ingress endpoints
